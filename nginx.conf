server {
    listen       80;
    server_name  localhost;

    # ── Ruta base de la aplicación ────────────────────────────────
    location /subsidios/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /subsidios/index.html;

        # ── Cabeceras de seguridad ────────────────────────────────
        add_header X-Frame-Options         "SAMEORIGIN"       always;
        add_header X-Content-Type-Options  "nosniff"          always;
        add_header X-XSS-Protection        "1; mode=block"    always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self' https://www.google.com https://www.gstatic.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://apidev.atu.gob.pe https://api.atu.gob.pe; frame-src https://www.google.com;" always;
    }

    # ── Evita caché para env.front.js (variables de entorno) ──────
    location = /subsidios/env.front.js {
        alias /usr/share/nginx/html/env.front.js;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Health check ──────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
